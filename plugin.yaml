name: local-rig-accounting
version: 0.3.0
description: "Transparent per-token cost accounting for local LLM inference — depreciation, energy, throughput-based pricing displayed alongside cloud provider costs. Regional electricity rate lookup. Community leaderboard submissions via GitHub Issues."
author: GumbyEnder
kind: standalone
provides_tools:
  - rig_cost
  - rig_summary
  - rig_benchmark
  - rig_submit
  - rig_rates
provides_hooks:
  - post_api_request
  - on_session_finalize
  - on_session_start
config_schema:
  local_rig:
    type: object
    properties:
      auto_submit:
        type: boolean
        default: true
        description: "When true, automatically submit benchmark results to the community leaderboard after a successful run (requires gh CLI auth). Default: true — auto-submits when gh auth is valid; set false to disable."
    additionalProperties: true
