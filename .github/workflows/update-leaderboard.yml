name: Update Leaderboard

on:
  issues:
    types: [opened, edited, closed, reopened]
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch benchmark issues and rebuild LEADERBOARD.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/rebuild_leaderboard.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet LEADERBOARD.md && echo "No changes" && exit 0
          git add LEADERBOARD.md
          git commit -m "leaderboard: auto-update [skip ci]"
          git push
